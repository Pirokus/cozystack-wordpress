apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: {{ .Release.Name }}-wordpress
  namespace: {{ .Release.Namespace }}
spec:
  interval: 5m
  chart:
    spec:
      chart: wordpress
      version: ">=1.0.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: external-wordpress
  values:
    replicaCount: {{ .Values.replicas }}
    wordpressPassword: {{ .Values.password }}
    service:
      type: ClusterIP
    ingress:
      enabled: true
      hostname: {{ .Values.host }}
      ingressClassName: tenant-root
